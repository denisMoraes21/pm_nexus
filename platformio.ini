[env:dev]
platform = espressif32
board = esp32dev
framework = arduino
lib_deps = 
    knolleary/PubSubClient@^2.8
    bblanchon/ArduinoJson@^6.21
build_flags =
    -D ENABLE_SENSORS
    -DCORE_DEBUG_LEVEL=5
upload_port = /dev/ttyUSB0
monitor_speed = 115200
upload_speed = 921600

